services:
  postgres:
    image: postgres:16-alpine
    container_name: yogaalbano-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-yogaalbano}
      POSTGRES_USER: ${POSTGRES_USER:-yogaalbano}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-yogaalbano_password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - yogaalbano-postgres-data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4:8
    container_name: yogaalbano-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@yogaalbano.local}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-admin_password}
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    volumes:
      - yogaalbano-pgadmin-data:/var/lib/pgadmin
    depends_on:
      - postgres

volumes:
  yogaalbano-postgres-data:
  yogaalbano-pgadmin-data:
